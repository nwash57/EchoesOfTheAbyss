<div class="px-4 py-3" style="animation: expandFade 0.2s ease-out;">
  @if (isUpdating()) {
    <div class="skeleton-loader">
      <div class="skeleton-line" style="width: 50%; height: 1.15rem; margin-bottom: 0.75rem;"></div>
      <div class="skeleton-line" style="width: 100%; height: 4rem;"></div>
    </div>
  } @else {
    @let loc = location();
    <div class="flex items-start justify-between gap-2 mb-2">
      <div style="font-family: 'Cinzel Decorative', serif; font-size: 1.05rem; color: oklch(88% 0.028 80); letter-spacing: 0.03em; line-height: 1.3;">
        {{ loc.title || loc.shortDescription }}
      </div>
      <div style="font-family: 'Courier Prime', monospace; font-size: 0.85rem; color: oklch(60% 0.06 265); white-space: nowrap; flex-shrink: 0; margin-top: 0.1rem;">
        {{ formatCoords(loc.coordinates.x, loc.coordinates.y) }}
      </div>
    </div>
    <div style="height: 1px; background: oklch(20% 0.018 265); margin-bottom: 0.625rem;"></div>
    <p style="font-family: 'Crimson Pro', serif; font-size: 1.15rem; font-style: italic; color: oklch(74% 0.02 265); line-height: 1.65;">
      {{ loc.longDescription }}
    </p>
  }
</div>
