<div class="flex flex-col h-full min-h-0" style="background: oklch(10% 0.018 265); border: 1px solid oklch(22% 0.02 265);">

  <!-- Panel label -->
  <div class="flex items-center gap-3 px-4 py-2 sticky top-0 z-10" style="background: oklch(10% 0.018 265); border-bottom: 1px solid oklch(20% 0.02 265);">
    <span style="font-family: 'Cinzel Decorative', serif; font-size: 0.8rem; letter-spacing: 0.2rem; color: oklch(55% 0.12 75); text-transform: uppercase;">
      World
    </span>
    <div class="flex-1" style="height: 1px; background: linear-gradient(to right, oklch(30% 0.08 75 / 0.3), transparent);"></div>
  </div>

  <div class="px-4 py-3 flex-1 flex flex-col gap-1 overflow-y-auto">

    <!-- Adventurer -->
    <app-accordion-section title="Adventurer" [(expanded)]="playerExpanded">
      <app-player-section
        [player]="game.worldContext().player"
        [equipment]="game.worldContext().equipment"
        [isUpdating]="game.isPlayerUpdating()" />
    </app-accordion-section>

    <!-- Location -->
    <app-accordion-section title="Location" [(expanded)]="locationExpanded">
      <app-location-section
        [location]="game.worldContext().currentLocation"
        [isUpdating]="game.isLocationUpdating()" />
    </app-accordion-section>

    <!-- World Map -->
    <app-accordion-section title="World Map" [(expanded)]="mapExpanded">
      <div class="p-2 h-[300px]" style="animation: expandFade 0.2s ease-out;">
        <app-map-viewer />
      </div>
    </app-accordion-section>

    <!-- Equipment -->
    <app-accordion-section title="Equipment" [(expanded)]="equipmentExpanded">
      <app-equipment-section
        [equipment]="game.worldContext().equipment"
        [isUpdating]="game.isEquipmentUpdating()" />
    </app-accordion-section>

    <!-- Chronicle -->
    <app-accordion-section
      title="Chronicle"
      [(expanded)]="logExpanded"
      [badge]="game.worldContext().adventureLog.length > 0 ? '' + game.worldContext().adventureLog.length : null">
      <app-adventure-log-section [log]="game.worldContext().adventureLog" />
    </app-accordion-section>

  </div>
</div>

<style>
  @keyframes expandFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .skeleton-loader {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .skeleton-line {
    background: linear-gradient(
      90deg,
      oklch(20% 0.02 265) 25%,
      oklch(25% 0.02 265) 50%,
      oklch(20% 0.02 265) 75%
    );
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
    border-radius: 2px;
  }

  @keyframes skeleton-loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
