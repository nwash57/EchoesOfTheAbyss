<div class="px-3 py-2 flex flex-col gap-0" style="animation: expandFade 0.2s ease-out;">
  @if (isUpdating()) {
    <div class="skeleton-loader py-2">
      <div class="skeleton-line" style="width: 100%; height: 1.5rem; margin-bottom: 0.5rem;"></div>
      <div class="skeleton-line" style="width: 100%; height: 1.5rem; margin-bottom: 0.5rem;"></div>
      <div class="skeleton-line" style="width: 100%; height: 1.5rem; margin-bottom: 0.5rem;"></div>
      <div class="skeleton-line" style="width: 100%; height: 1.5rem;"></div>
    </div>
  } @else {
    @for (slot of slotList(); track slot.label) {
      <div class="flex items-center gap-2 py-2" style="border-bottom: 1px solid oklch(16% 0.018 265);">
        <div style="display: flex; align-items: center; gap: 0.4rem; min-width: 6.5rem;">
          <span style="font-size: 0.9rem; color: oklch(60% 0.08 75); flex-shrink: 0;">{{ slot.icon }}</span>
          <span style="font-family: 'Courier Prime', monospace; font-size: 0.8rem; letter-spacing: 0.06em; color: oklch(58% 0.03 265); text-transform: uppercase; flex-shrink: 0;">
            {{ slot.label }}
          </span>
        </div>

        @if (slot.piece) {
          <div class="flex-1 min-w-0">
            <span style="font-family: 'Crimson Pro', serif; font-size: 1.1rem; color: oklch(85% 0.025 80);" class="block truncate">
              {{ slot.piece.name }}
            </span>
          </div>
          <div style="display: flex; gap: 0.5rem; flex-shrink: 0;">
            @if (slot.piece.armor > 0) {
              <span style="font-family: 'Courier Prime', monospace; font-size: 0.8rem; color: oklch(70% 0.08 230);">
                ◈{{ slot.piece.armor }}
              </span>
            }
            @if (slot.piece.damage > 0) {
              <span style="font-family: 'Courier Prime', monospace; font-size: 0.8rem; color: oklch(70% 0.12 20);">
                ✦{{ slot.piece.damage }}
              </span>
            }
          </div>
        } @else {
          <span style="font-family: 'Crimson Pro', serif; font-size: 1rem; font-style: italic; color: oklch(42% 0.015 265);">
            — empty —
          </span>
        }
      </div>
    }
  }
</div>
